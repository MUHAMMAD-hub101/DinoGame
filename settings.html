<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        /* --- PREMIUM INTERACTIVE CYBERPUNK HUD OVERHAUL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 15%, #051622 0%, #02080f 40%, #000103 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 140px 20px 60px;
            color: #f1f5f9;
            overflow-x: hidden;
            position: relative;
        }
     
        /* Ambient holographic digital grid backdrop */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(34, 211, 238, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        /* Neon energy line across the top screen */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, #22d3ee, #6366f1, #22d3ee, transparent);
            z-index: 101;
            filter: drop-shadow(0 0 10px #22d3ee);
        }
           /* --- PREMIUM BLUISH CYBERPUNK SCROLLBAR STYLING --- */

/* 1. Scrollbar ka poora track width (No layout impact, elements safe) */
::-webkit-scrollbar {
    width: 10px;  /* Vertical scrollbar ki broadness */
    height: 10px; /* Horizontal scrollbar ki broadness */
}

/* 2. Scrollbar ka background track (Deep Dark Space Blend) */
::-webkit-scrollbar-track {
    background: #02080f; /* Aapke body background se perfectly blend hoga */
    border-left: 1px solid rgba(34, 211, 238, 0.05); /* Soft cyber edge line */
}

/* 3. Scrollbar ka Draggable handle (The Thumb - Neon Cyan Gradient Glow) */
::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #0284c7 0%, #22d3ee 100%);
    border-radius: 10px; /* Smooth edges */
    border: 2px solid #02080f; /* Track se separation ke liye padding illusion */
    box-shadow: inset 0 0 6px rgba(34, 211, 238, 0.3);
}

/* 4. Handle par Hover karne ka dynamic effect (Electric Purple/Blue Shift) */
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, #22d3ee 0%, #6366f1 100%);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.8);
}

/* 5. Scrollbar Corners (Jahan vertical aur horizontal tracks milte hain) */
::-webkit-scrollbar-corner {
    background: #000103;
}
        /* Fixed Elite Micro-Faceted Glass Topbar Navigation */

        /* Command Station Premium Glassmorphic Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;

        /* High-End Tactical Dragon Selector Layout via CSS Pure Styling */
        .dragon-selector-container {

        .dragon-selector-container::after {

        .dragon-selector-container label {

        .dragon-select {

        }

}

        .sound-library h2::after, .action-sounds h2::after {
            content: ''; position: absolute; bottom: -2px; left: 35%; width: 30%; height: 2px; background: linear-gradient(90deg, #22d3ee, #6366f1);

        /* High Precision HUD Scroll Container */

        }
        
        .sound-list::-webkit-scrollbar {

        }
        
        .sound-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .sound-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #22d3ee, #6366f1);
            border-radius: 10px;
        }

        /* Interactive Sound Row Panels */
        .sound-item {
            display: flex;
            justify-content: space-between;

        }

        /* Neon Tactical Action Trigger Buttons */
        .import-btn {
            background: linear-gradient(135deg, #0284c7 0%, #22d3ee 50%, #6366f1 100%);
            background-size: 200% auto;
            color: #01040a;
            border: none;

            border-radius: 14px;

            background-position: right center;

        /* Action Mapping Selectors Infrastructure */

            margin-bottom: 1.8rem;

        .action-select-group:hover label {

            background-repeat: no-repeat;
            background-position: calc(100% - 18px) center;

        /* Immersive HUD Toast Systems Overlay */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: linear-gradient(135deg, rgba(2, 8, 16, 0.95), rgba(6, 18, 36, 0.95));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #ffffff;
            padding: 18px 36px;
            border-radius: 14px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            z-index: 1000;
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-left: 5px solid #22d3ee;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        
        .toast.error {
            border-color: rgba(239, 68, 68, 0.4);
            border-left-color: #ef4444;

        }
        .footer-note {
    text-align: center;

    letter-spacing: 2px;

    font-weight: bold;

}

/* Individual Spans Base Configuration */
.footer-note span {
    display: inline-block;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Base Colors Before Hover */
.footer-note .cyber-star { color: #fcfdfe; }
.footer-note .cyber-dots { color: #ffffff; letter-spacing: 4px; }
.footer-note .cyber-line { color: rgb(244, 238, 238); }
.footer-note .cyber-core { color: #f5f6f9; transform: scale(1); }

/* --- PREMIUM INTERACTIVE HOVER EFFECTS (Jab Main Card par Hover hoga) --- */

/* 1. Cyber Stars: Glow aur Breath Effect */
.home-card:hover .footer-note .cyber-star {
    color: #22d3ee;
    text-shadow: 0 0 10px #22d3ee;
    animation: starPulse 1.5s infinite ease-in-out;
}

/* 2. Cyber Dots: Shifting aur Range Colors */
.home-card:hover .footer-note .cyber-dots {
    color: #6366f1;
    text-shadow: 0 0 8px #6366f1;
}

/* 3. Cyber Line: Light Speed Beam Effect */
.home-card:hover .footer-note .cyber-line {
    color: rgba(34, 211, 238, 0.5);
    text-shadow: 0 0 4px rgba(34, 211, 238, 0.3);
}

/* 4. Cyber Core: Chota Bada Hona (Size Pulse) + Intense Glow */
.home-card:hover .footer-note .cyber-core {
    color: #ffffff;
    text-shadow: 0 0 15px #22d3ee, 0 0 30px #6366f1;
    animation: coreSizeChange 2s infinite ease-in-out;
}

/* 5. Custom Dynamic Border Lines for Footer Box */
.footer-note::before,
.footer-note::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 1px;
    background: linear-gradient(90deg, transparent, #22d3ee, transparent);
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0;
}

.footer-note::before { top: 0; left: 50%; transform: translateX(-50%); }
.footer-note::after { bottom: 0; left: 50%; transform: translateX(-50%); }

/* Hover hone par fine borders expanding effect */
.home-card:hover .footer-note::before,
.home-card:hover .footer-note::after {
    width: 60%; /* Border lines expand ho kar 60% tak jayengi */
    opacity: 1;
}

/* --- ANIMATIONS KEYFRAMES ENGINE --- */

/* Stars ke liye chota-bada hone ka rhythmic loop */
@keyframes starPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.3); opacity: 1; }
}

/* Main Core Symbol ka dynamic size fluctuation */
@keyframes coreSizeChange {
    0%, 100% { 
        transform: scale(1); 
        filter: brightness(1); 
    }
    50% { 
        transform: scale(1.4); /* Size bada hoga */
        filter: brightness(1.5); 
    }
}

        /* --- HIGH PERFORMANCE MOBILE RESPONSIVE ADAPTIVE ENGINE --- */

    <script>
        // Notification helper
        function showNotification(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
        const dragonSelect = document.getElementById('dragonSelect');
        dragonSelect.value = localStorage.getItem('selectedDragon')||'Dino .';
        dragonSelect.addEventListener('change', (e) => {
            localStorage.setItem('selectedDragon', e.target.value);
            showNotification(`Active Dragon updated to: ${e.target.value || 'None'}`);
        });


        // Sound library logic
        let audioCtx = null;
        let globalSoundLibrary = [];
        let soundSelections = {
            jump: 'default',
            hit: 'default',
            start: 'default',
            stop: 'default',
            restart: 'default',
            resume: 'default'
        };

        function loadData() {
            try {
                let storedLib = localStorage.getItem('globalSoundLibrary');
                if (storedLib) {
                    globalSoundLibrary = JSON.parse(storedLib);
                } else {
                    globalSoundLibrary = [];
                }
                let selections = localStorage.getItem('soundSelections');
                if (selections) {
                    soundSelections = JSON.parse(selections);
                }
            } catch (e) {
                showNotification('Error loading sound data', true);
                globalSoundLibrary = [];
                soundSelections = { jump: 'default', hit: 'default', start: 'default', stop: 'default', restart: 'default', resume: 'default' };
            }
        }

        function saveData() {
            try {
                localStorage.setItem('globalSoundLibrary', JSON.stringify(globalSoundLibrary));
                localStorage.setItem('soundSelections', JSON.stringify(soundSelections));
            } catch (e) {
                showNotification('Error saving sound data', true);
            }
        }

        function refreshUI() {
            const listDiv = document.getElementById('soundLibraryList');
            listDiv.innerHTML = '';
            for (let s of globalSoundLibrary) {
                const item = document.createElement('div');
                item.className = 'sound-item';
                item.innerHTML = `<span>${escapeHtml(s.name)}</span><button class="delete-sound" data-name="${escapeHtml(s.name)}">🗑️</button>`;
                listDiv.appendChild(item);
            }
            document.querySelectorAll('.delete-sound').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const name = btn.getAttribute('data-name');
                    const index = globalSoundLibrary.findIndex(s => s.name === name);
                    if (index !== -1) {
                        globalSoundLibrary.splice(index, 1);
                        for (let action in soundSelections) {
                            if (soundSelections[action] === name) soundSelections[action] = 'default';
                        }
                        saveData();
                        refreshUI();
                        showNotification(`Sound "${name}" deleted.`);
                    }
                });
            });

            const actionsDiv = document.getElementById('actionSelectors');
            actionsDiv.innerHTML = '';
            const actions = ['jump', 'hit', 'start', 'stop', 'restart', 'resume'];
            for (let action of actions) {
                const div = document.createElement('div');
                div.className = 'action-select-group';
                div.innerHTML = `<label>${action.toUpperCase()}</label>`;
                const select = document.createElement('select');
                select.className = 'action-select';
                let options = '<option value="default">Default</option>';
                for (let s of globalSoundLibrary) options += `<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`;
                select.innerHTML = options;
                select.value = soundSelections[action] || 'default';
                select.addEventListener('change', (e) => {
                    soundSelections[action] = e.target.value;
                    saveData();
                    showNotification(`Sound for ${action} updated.`);
                });
                div.appendChild(select);
                actionsDiv.appendChild(div);
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function importSound(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const dataURL = e.target.result;
                if (globalSoundLibrary.some(s => s.name === file.name)) {
                    showNotification(`Sound "${file.name}" already exists.`, true);
                    return;
                }
                try {
                    if (!audioCtx) {
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    const arrayBuffer = await fetch(dataURL).then(res => res.arrayBuffer());
                    await audioCtx.decodeAudioData(arrayBuffer);
                    globalSoundLibrary.push({ name: file.name, dataURL: dataURL });
                    saveData();
                    refreshUI();
                    showNotification(`Sound "${file.name}" imported.`);
                } catch(err) {
                    showNotification("Invalid audio file or format not supported.", true);
                }
            };
            reader.onerror = () => showNotification("File read error.", true);
            reader.readAsDataURL(file);
        }

        loadData();
        refreshUI();

        document.getElementById('importSoundBtn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'audio/*';
            input.onchange = (e) => {
                if (e.target.files[0]) importSound(e.target.files[0]);
            };
            input.click();
        });
    </script>
</body>
</html>
