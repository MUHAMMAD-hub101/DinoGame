<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OMEGA RAPTOR | Home</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a1f0e, #020804);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            padding: 20px;
        }

        .home-card {
            background: rgba(20, 25, 18, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 215, 120, 0.4);
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 200, 0.2);
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .home-card:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #ffdf8c, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tagline {
            color: #ffcf77;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            border-bottom: 1px dashed rgba(255,200,100,0.5);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .play-btn {
            background: linear-gradient(135deg, #ffb347, #ff8c1a);
            border: none;
            font-size: 1.8rem;
            padding: 0.8rem 2.5rem;
            border-radius: 4rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #7a4316;
            transition: 0.08s linear;
            color: #1e2a0c;
            margin: 1rem 0;
            width: 80%;
            max-width: 280px;
        }

        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a4316;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }

        .feature {
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: #ffdd99;
            backdrop-filter: blur(4px);
        }

        footer {
            font-size: 0.7rem;
            color: #bfb073;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="home-card">
        <h1>🦖 OMEGA RAPTOR</h1>
        <div class="tagline">Run. Jump. Survive.</div>
        <button class="play-btn" onclick="window.location.href='game.html'">▶ PLAY NOW</button>
        <div class="features">
            <span class="feature">🌄 Dynamic Scenery</span>
            <span class="feature">🎵 Custom Sounds</span>
            <span class="feature">🏆 High Scores</span>
        </div>
        <footer>✦ Every run is unique ✦</footer>
    </div>
</body>
</html>
